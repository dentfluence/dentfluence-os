# =============================================================================
# Dentfluence — nginx site config
# Serves static files from /public and forwards PHP requests to the `app`
# container (PHP-FPM) over the internal Docker network on port 9000.
# SSL/HTTPS is terminated by a reverse proxy in FRONT of this (see DEPLOY.md);
# this container listens on plain HTTP port 80 inside the Docker network.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Max upload size — must be >= PHP's post_max_size (55M)
    client_max_body_size 55M;

    # --- gzip compression for text assets ------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # --- Security headers -----------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Main Laravel front-controller routing --------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Pass PHP to the app (PHP-FPM) container ------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;            # "app" = service name in docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120;
    }

    # --- Long-cache compiled/static assets ------------------------------------
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Block access to hidden/sensitive files -------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
