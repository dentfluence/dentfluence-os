; =============================================================================
; Dentfluence — Production PHP settings (loaded into PHP-FPM)
; Tuned for a clinic app that uploads patient images / scanned forms.
; =============================================================================

; --- Resource limits ---------------------------------------------------------
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

; --- File uploads (X-rays, intake scans, lab photos can be large) ------------
upload_max_filesize = 50M
post_max_size = 55M

; --- Error handling: never show errors to the browser in production ----------
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Security: hide PHP version, restrict risky behaviour --------------------
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; --- Sessions / timezone -----------------------------------------------------
date.timezone = "Asia/Kolkata"

; --- OPcache: compiles PHP to bytecode and keeps it in memory (big speedup) ---
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
; In production the code does not change at runtime, so don't re-check files
; on every request (faster). A new deploy = new container = fresh cache.
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
