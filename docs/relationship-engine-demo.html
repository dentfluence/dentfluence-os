<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Engine — Clickable Demo (English / हिंदी / मराठी)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root{
    --plum:#6a0f70; --plum-dark:#4e0a53; --plum-soft:#f3e8f4; --plum-border:#dfc5e1;
    --ink:#1a0320; --muted:#6a5a76; --line:#e8dff0; --head:#faf5fc; --page:#f7f3fa;
    --hi:#b52020; --hi-bg:#fdeaea; --md:#a05c00; --md-bg:#fff4e0; --lo:#1a7a45; --lo-bg:#e8f7ef;
    --mr:#0d5c6b; --mr-bg:#e4f4f7; --mr-border:#b6e0e8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;}
  body.lang-dev{font-family:'Noto Sans Devanagari','DM Sans',sans-serif;}
  body.lang-dev .ph h1, body.lang-dev .dh .title, body.lang-dev .brandline b, body.lang-dev .kanban-col h3, body.lang-dev .modal-h h3{font-family:'Noto Sans Devanagari','DM Sans',sans-serif;}
  a{color:inherit;}

  .demo-bar{background:linear-gradient(135deg,var(--plum-dark),var(--plum));color:#fff;padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .demo-bar .tag{background:rgba(255,255,255,.18);border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 9px;text-transform:uppercase;}
  .demo-bar .txt{font-size:13.5px;opacity:.96;}
  .langseg{margin-left:auto;display:flex;background:rgba(255,255,255,.14);border-radius:9px;padding:3px;gap:3px;}
  .langseg button{border:none;background:none;color:#fff;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:7px;cursor:pointer;font-family:'DM Sans','Noto Sans Devanagari',sans-serif;}
  .langseg button.on{background:#fff;color:var(--plum);}

  .app{max-width:1180px;margin:0 auto;padding:0 22px 60px;}
  .brandline{display:flex;align-items:center;gap:10px;padding:16px 2px 6px;}
  .brandline .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--plum),#b3247e);}
  .brandline b{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink);}
  .brandline span{font-size:12px;color:var(--muted);}

  .tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--line);margin-bottom:8px;overflow-x:auto;}
  .tab{display:flex;align-items:center;gap:7px;padding:11px 14px;font-size:13px;font-weight:600;color:#9a7aaa;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;cursor:pointer;}
  .tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .tab:hover{color:var(--plum);} .tab.active{color:var(--plum);border-bottom-color:var(--plum);}

  .coach{font-size:12.5px;color:var(--mr);background:var(--mr-bg);border:1px solid var(--mr-border);border-radius:8px;padding:8px 12px;margin:8px 0 14px;display:flex;gap:8px;align-items:flex-start;}
  .coach i{color:var(--mr);margin-top:1px;}

  .ph{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .ph h1{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:600;margin:0 0 3px;}
  .ph .sub{font-size:12.5px;color:#9a7aaa;margin:0;}
  .ph .controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .badge{font-size:12.5px;font-weight:600;color:var(--plum);background:var(--plum-soft);border:1px solid var(--plum-border);border-radius:99px;padding:5px 13px;display:inline-flex;gap:6px;align-items:center;}
  .chip{padding:6px 11px;border:1px solid var(--plum-border);border-radius:8px;background:#fff;color:var(--plum);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .chip.active{background:var(--plum-soft);border-color:var(--plum);}
  .chip.solid{background:var(--plum);color:#fff;border-color:var(--plum);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
  .card-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f0e8f5;background:var(--head);}
  .card-icon{width:28px;height:28px;border-radius:7px;background:#ede4f7;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--plum);flex-shrink:0;}
  .card-label{font-weight:600;font-size:13px;color:var(--ink);flex:1;min-width:0;}
  .card-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;background:#ede4f7;color:var(--plum);}
  .card-max{color:var(--plum);font-size:13px;flex-shrink:0;cursor:pointer;}
  .cap{font-size:11.5px;color:var(--mr);background:#f4fbfc;border-bottom:1px solid #eef6f7;padding:6px 14px;}
  .card-list{max-height:280px;overflow-y:auto;}
  .row{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid #f8f4fc;}
  .row:last-child{border-bottom:none;} .row:hover{background:#fdf9ff;}
  .row.done{opacity:.5;} .row.done:hover{opacity:.9;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dot.hi{background:var(--hi);} .dot.md{background:var(--md);} .dot.lo{background:var(--lo);}
  .row-body{flex:1;min-width:0;}
  .row-name{font-weight:600;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-reason{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-outcome{font-size:11px;color:var(--lo);font-weight:600;display:none;}
  .row.done .row-reason{display:none;} .row.done .row-outcome{display:block;}
  .row-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .b-call{width:24px;height:24px;border-radius:6px;background:var(--plum);color:#fff;border:none;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;}
  .b-call:hover{background:var(--plum-dark);}
  .b-wa{background:#25a366;} .b-wa:hover{background:#1c8150;}
  .b-open{width:24px;height:24px;border-radius:6px;color:var(--plum);border:1px solid var(--plum-border);background:#fff;font-size:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
  .footnote{font-size:11.5px;color:#b3a0b8;text-align:center;padding:14px 0 0;}

  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;}
  .kpi:hover{border-color:var(--plum-border);}
  .kpi .n{font-size:26px;font-weight:700;color:var(--plum);font-family:'Cormorant Garamond',serif;}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:2px;} .kpi .d{font-size:11px;margin-top:4px;}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .panel h4{margin:0;padding:11px 15px;font-size:13px;border-bottom:1px solid #f0e8f5;background:var(--head);}
  .pl{display:flex;align-items:center;gap:9px;padding:9px 15px;border-bottom:1px solid #f8f4fc;font-size:12.5px;}
  .pl:last-child{border-bottom:none;} .pl small{color:var(--muted);}

  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
  .kanban-col{flex:0 0 230px;background:#f3f0f7;border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;max-height:560px;}
  .kanban-col .colhead{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .kanban-col h3{margin:0;font-size:13px;font-weight:700;}
  .kanban-col .cc{font-size:11px;font-weight:700;background:#fff;border-radius:99px;padding:1px 8px;color:var(--muted);}
  .kanban-col .collist{padding:9px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;}
  .lead{background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 11px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .lead:hover{border-color:var(--plum-border);}
  .lead .nm{font-weight:600;font-size:13px;} .lead .sr{font-size:11px;color:var(--muted);margin-top:2px;}
  .lead .vl{font-size:12px;font-weight:700;color:var(--lo);margin-top:6px;}
  .lead .tg{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;margin-top:6px;}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .inp{border:1.5px solid var(--plum-border);border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:inherit;background:#fff;color:var(--ink);}
  table.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#9a7aaa;padding:10px 14px;background:var(--head);border-bottom:1px solid var(--line);}
  table.tbl td{padding:10px 14px;border-bottom:1px solid #f6f2fa;font-size:13px;}
  table.tbl tr:last-child td{border-bottom:none;} table.tbl tr:hover td{background:#fdf9ff;}
  .st{font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
  .st.pending{background:#eff6ff;color:#1e40af;} .st.overdue{background:#fdecec;color:#8a1f1f;}
  .st.waiting{background:#e6f1fb;color:#185fa5;}
  .mini{padding:4px 9px;border:1px solid var(--plum-border);border-radius:7px;background:#fff;color:var(--plum);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}

  .wa{display:grid;grid-template-columns:280px 1fr;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;min-height:460px;}
  .wa-list{border-right:1px solid var(--line);overflow-y:auto;}
  .wa-conv{display:flex;gap:10px;padding:11px 13px;border-bottom:1px solid #f6f2fa;cursor:pointer;align-items:center;}
  .wa-conv:hover,.wa-conv.on{background:#f4fbf7;}
  .wa-av{width:34px;height:34px;border-radius:50%;background:#d9f0e3;color:#1c8150;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .wa-cn{flex:1;min-width:0;} .wa-cn .nm{font-weight:600;font-size:13px;}
  .wa-cn .lm{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wa-un{background:#25a366;color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:1px 7px;}
  .wa-chat{display:flex;flex-direction:column;background:#efe7de;}
  .wa-head{background:#f6f2fa;border-bottom:1px solid var(--line);padding:10px 15px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:9px;}
  .wa-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
  .bub{max-width:72%;padding:8px 11px;border-radius:10px;font-size:12.5px;line-height:1.45;box-shadow:0 1px 1px rgba(0,0,0,.06);}
  .bub.inb{background:#fff;align-self:flex-start;border-top-left-radius:2px;}
  .bub.out{background:#d9fdd3;align-self:flex-end;border-top-right-radius:2px;}
  .bub .tm{font-size:9.5px;color:#7a8a7a;text-align:right;margin-top:3px;}
  .wa-input{display:flex;gap:8px;padding:10px 12px;background:#f6f2fa;border-top:1px solid var(--line);}
  .wa-input input{flex:1;border:1px solid var(--plum-border);border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;outline:none;}
  .wa-input button{width:38px;height:38px;border-radius:50%;background:#25a366;color:#fff;border:none;cursor:pointer;}

  .backdrop{position:fixed;inset:0;background:rgba(26,3,32,.4);z-index:60;display:none;align-items:center;justify-content:center;padding:20px;}
  .backdrop.show{display:flex;}
  .drawer{width:470px;max-width:100%;max-height:90vh;background:#fff;display:flex;flex-direction:column;border-radius:16px;box-shadow:0 20px 60px rgba(26,3,32,.3);overflow:hidden;}
  .dh{padding:16px 20px 14px;background:linear-gradient(135deg,var(--plum-dark),var(--plum));color:#fff;}
  .dh .cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.75;display:flex;justify-content:space-between;align-items:center;}
  .dh .x{background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:4px 8px;color:#fff;cursor:pointer;}
  .dh .title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;margin:8px 0 2px;}
  .dh .sub{font-size:12px;opacity:.8;margin:0;}
  .db{flex:1;overflow-y:auto;padding:18px 20px;}
  .sec{margin-bottom:18px;}
  .sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a7aaa;margin-bottom:8px;}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .sitem{background:#f8f4fc;border-radius:8px;padding:8px 10px;}
  .sitem .l{font-size:10px;color:#9a7aaa;text-transform:uppercase;letter-spacing:.06em;}
  .sitem .v{font-size:13px;font-weight:600;color:var(--ink);margin-top:2px;}
  .checklist{list-style:none;padding:0;margin:0;}
  .checklist li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f5f0fa;font-size:13px;}
  .checklist li:last-child{border-bottom:none;}
  .checklist input{width:16px;height:16px;accent-color:var(--plum);margin-top:1px;}
  .tabsw{display:flex;gap:22px;border-bottom:1px solid #f0ebf5;margin-bottom:4px;}
  .tabsw button{background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;padding:9px 2px;font-size:13px;font-weight:600;color:#b3a6bf;cursor:pointer;font-family:inherit;}
  .tabsw button.on{color:var(--plum);font-weight:700;border-bottom-color:var(--plum);}
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--plum-dark);margin-bottom:5px;}
  select.fs,textarea.ft{width:100%;border:1.5px solid var(--plum-border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--ink);font-family:inherit;background:#fff;outline:none;}
  select.fs:focus,textarea.ft:focus{border-color:var(--plum);box-shadow:0 0 0 3px rgba(106,15,112,.1);}
  textarea.ft{resize:vertical;min-height:64px;}
  .fg{margin-bottom:14px;}
  .next-box{background:#f0f9f4;border:1px solid #b8e0ca;border-radius:8px;padding:10px 13px;font-size:13px;color:var(--lo);display:flex;gap:8px;align-items:flex-start;margin-top:6px;}
  .df{padding:13px 20px;border-top:1px solid #f0e8f5;display:flex;gap:10px;align-items:center;}
  .b-cancel{padding:9px 16px;background:var(--plum-soft);color:var(--plum);border:1px solid var(--plum-border);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .b-dismiss{background:none;border:none;color:#9a7aaa;font-size:12.5px;cursor:pointer;text-decoration:underline;margin-right:auto;font-family:inherit;}
  .b-submit{padding:10px 18px;background:var(--plum);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;gap:6px;align-items:center;}
  .b-submit:disabled{background:#b3a0b8;cursor:not-allowed;} .b-submit.green{background:#4a7a5a;}
  .help{font-size:12px;color:var(--mr);background:#f4fbfc;border:1px dashed var(--mr-border);border-radius:8px;padding:8px 11px;margin:2px 0 12px;display:flex;gap:7px;align-items:flex-start;}
  .help i{color:var(--mr);margin-top:1px;}

  details.src{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden;}
  details.src summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:13px;font-weight:700;color:var(--plum);display:flex;align-items:center;gap:8px;background:var(--head);}
  details.src summary::-webkit-details-marker{display:none;}
  details.src summary .cv{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:600;}
  details.src[open] summary .cv{display:none;}
  details.src .sc{padding:13px 16px;}
  details.src .sc .r{display:flex;gap:11px;margin-bottom:11px;} details.src .sc .r:last-child{margin-bottom:0;}
  details.src .sc .ic{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
  details.src .sc .ic.auto{background:var(--lo-bg);color:var(--lo);} details.src .sc .ic.man{background:var(--plum-soft);color:var(--plum);}
  details.src .sc b{font-size:12.5px;} details.src .sc .tx{font-size:12.5px;color:#4a4152;line-height:1.5;}

  .modal-bd{position:fixed;inset:0;background:rgba(26,3,32,.42);z-index:70;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-bd.show{display:flex;}
  .modal{width:530px;max-width:100%;max-height:92vh;background:#fff;border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(26,3,32,.3);}
  .modal-h{padding:16px 20px;background:linear-gradient(135deg,var(--plum-dark),var(--plum));color:#fff;position:relative;}
  .modal-h h3{margin:0;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;}
  .modal-h p{margin:3px 0 0;font-size:12px;opacity:.85;}
  .modal-h .x{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:4px 8px;color:#fff;cursor:pointer;}
  .modal-b{padding:18px 20px;overflow-y:auto;}
  .modal-intro{background:#f4fbfc;border:1px dashed var(--mr-border);border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--mr);margin-bottom:16px;display:flex;gap:8px;line-height:1.5;}
  .modal-intro i{margin-top:1px;}
  .ff{margin-bottom:14px;}
  .ff label{display:block;font-size:12.5px;font-weight:700;color:var(--plum-dark);margin-bottom:2px;}
  .ff .hlp{font-size:11.5px;color:var(--muted);margin-bottom:6px;line-height:1.4;}
  .ff input,.ff select,.ff textarea{width:100%;border:1.5px solid var(--plum-border);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);outline:none;}
  .ff textarea{min-height:56px;resize:vertical;}
  .ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--plum);box-shadow:0 0 0 3px rgba(106,15,112,.1);}
  .modal-f{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;z-index:80;font-family:'Noto Sans Devanagari','DM Sans',sans-serif;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
</style>
</head>
<body>

<div class="demo-bar">
  <span class="tag" data-t="demoTag">Demo</span>
  <span class="txt" data-t="demo"></span>
  <div class="langseg">
    <button data-lang="en" class="on" onclick="setLang('en')">English</button>
    <button data-lang="hi" onclick="setLang('hi')">हिंदी</button>
    <button data-lang="mr" onclick="setLang('mr')">मराठी</button>
  </div>
</div>

<div class="app">
  <div class="brandline"><span class="dot"></span><b>Dentfluence</b><span data-t="brandRel"></span></div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>

<!-- Call Workflow Drawer -->
<div class="backdrop" id="backdrop" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="dh"><div class="cat"><span id="dCat"></span><button class="x" onclick="closeDrawer()"><i class="ti ti-x"></i></button></div>
      <div class="title" id="dName"></div><p class="sub" id="dSuggest"></p></div>
    <div class="db">
      <div class="sec"><div class="sec-label" data-t="sumLabel"></div><div class="help"><i class="ti ti-bulb"></i><span data-t="hSummary"></span></div><div class="sgrid" id="dSummary"></div></div>
      <div class="sec"><div class="sec-label" data-t="notesLabel"></div><div class="help"><i class="ti ti-message-2"></i><span data-t="hNotes"></span></div>

// ══ Tabs + router ═══════════════════════════════════════════════════════════
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>
    `<span class="tab${t.key===ACTIVE?' active':''}" onclick="setTab('${t.key}')"><svg viewBox="0 0 24 24">${t.svg}</svg>${t[LANG]}</span>`).join('');
}
function setTab(k){ACTIVE=k;renderTabs();renderView();}
function ph(hk,sk,ctrl){return `<div class="ph"><div><h1>${T(hk)}</h1><p class="sub">${T(sk)}</p></div><div class="controls">${ctrl||''}</div></div>`;}
function coach(ck){return `<div class="coach"><i class="ti ti-info-circle"></i><span>${T(ck)}</span></div>`;}

function renderView(){
  const v=document.getElementById('view');
  if(ACTIVE==='today')            v.innerHTML=viewToday();
  else if(ACTIVE==='dashboard')   v.innerHTML=viewDashboard();
  else if(ACTIVE==='pipeline')    v.innerHTML=viewKanban(PIPE_STAGES,LEADS,'lead');
  else if(ACTIVE==='opportunities')v.innerHTML=viewKanban(OPP_STAGES,OPPS,'opp');
  else if(ACTIVE==='recalls')     v.innerHTML=viewRecalls();
  else if(ACTIVE==='whatsapp')    v.innerHTML=viewWhatsapp();
  else if(ACTIVE==='list')        v.innerHTML=viewList();
  else if(ACTIVE==='analytics')   v.innerHTML=viewAnalytics();
  if(ACTIVE==='today') renderCards();
}

// ══ Add-form modal ══════════════════════════════════════════════════════════
let CUR_FORM=null;
function openForm(kind){
  CUR_FORM=kind; const f=FORMS[kind];
  document.getElementById('fmTitle').textContent=L(f.title);
  document.getElementById('fmSub').textContent=L(f.sub);
  document.getElementById('fmIntro').textContent=L(f.intro);
  document.getElementById('fmCancel').textContent=T('btnCancel');
  document.getElementById('fmSave').innerHTML='<i class="ti ti-check"></i> '+T('save');
  document.getElementById('fmFields').innerHTML=f.fields.map((fld,i)=>{
    let input;
    if(fld.type==='select') input=`<select id="ff${i}">${fld.options.map((o,oi)=>`<option value="${oi}">${L(o)}</option>`).join('')}</select>`;
    else if(fld.type==='textarea') input=`<textarea id="ff${i}" placeholder="${L(fld.ph)}"></textarea>`;
    else input=`<input id="ff${i}" type="${fld.type}" placeholder="${L(fld.ph)}">`;
    return `<div class="ff"><label>${L(fld.label)}</label><div class="hlp">${L(fld.help)}</div>${input}</div>`;
  }).join('');
  document.getElementById('formModal').classList.add('show');
}
function closeForm(){document.getElementById('formModal').classList.remove('show');CUR_FORM=null;}
function fv(i){const el=document.getElementById('ff'+i);return el?el.value:'';}
function fidx(i){const el=document.getElementById('ff'+i);return el?el.selectedIndex:0;}
function submitForm(){
  const kind=CUR_FORM; if(!kind)return;
  if(!fv(0).trim()){showToast(T('required'));return;}
  if(kind==='lead'){
    const name=fv(0), interest=fv(3)||'Enquiry', val=fv(4)||'—';
    LEADS.unshift({stage:'new_lead',name,src:{en:interest,hi:interest,mr:interest},val,tag:{en:'New',hi:'नया',mr:'नवीन'},tc:'#534AB7',tb:'#eeedfe'});
    showToast(T('addedLead')); closeForm(); if(ACTIVE==='pipeline')renderView(); else setTab('pipeline');
  } else if(kind==='opp'){
    const name=fv(0), tr=fv(1)||'Treatment', val=fv(2)||'—';
    OPPS.unshift({stage:'prospect',name,tr:{en:tr,hi:tr,mr:tr},val});
    showToast(T('addedOpp')); closeForm(); if(ACTIVE==='opportunities')renderView(); else setTab('opportunities');
  } else if(kind==='call'){
    const name=fv(0), phone=fv(1), reason=fv(2)||'Manual call', pri=['hi','md','lo'][fidx(3)]||'md';
    const id='man'+(MANUAL.length+1);
    const item={id,name,pri,phone,cat:'manual',reason:{en:reason,hi:reason,mr:reason},suggest:{en:reason,hi:reason,mr:reason}};
    MANUAL.push(item); store[id]=item;
    showToast(T('addedCall')); closeForm(); if(ACTIVE==='today')renderView(); else setTab('today');
  }
}

  document.getElementById('dCat').textContent=catLabel(cat);
  document.getElementById('dName').textContent=cur.name;
  document.getElementById('dSuggest').textContent=cur.suggest?L(cur.suggest):'';
  let s=`<div class="sitem"><div class="l">${T('lReason')}</div><div class="v">${L(cur.reason)}</div></div>
         <div class="sitem"><div class="l">${T('lPriority')}</div><div class="v">${T(PRI[cur.pri])}</div></div>`;
  if(cur.phone)     s+=`<div class="sitem"><div class="l">${T('lPhone')}</div><div class="v" style="color:var(--plum)">${cur.phone}</div></div>`;
  if(cur.treatment) s+=`<div class="sitem"><div class="l">${T('lTreatment')}</div><div class="v">${L(cur.treatment)}</div></div>`;
  if(cur.balance)   s+=`<div class="sitem"><div class="l">${T('lBalance')}</div><div class="v">₹${cur.balance}</div></div>`;
  document.getElementById('dSummary').innerHTML=s;
  const cl=CHECKLISTS[cat]||CHECKLISTS.default;
  document.getElementById('dChecklist').innerHTML=cl.map((t,i)=>`<li><input type="checkbox" id="ck${i}"><label for="ck${i}">${L(t)}</label></li>`).join('');
  const oc=OUTCOMES[cat]||OUTCOMES.default;
  document.getElementById('dOutcome').innerHTML=`<option value="">${T('selectOutcome')}</option>`+Object.entries(oc).map(([k,v])=>`<option value="${k}">${L(v)}</option>`).join('');
  document.getElementById('dNotes').value=''; document.getElementById('dNextSec').style.display='none'; document.getElementById('dLogBtn').disabled=true;
}
function closeDrawer(){document.getElementById('backdrop').classList.remove('show');cur=null;}
function switchTab(t){const log=t==='log';
  document.getElementById('tabLog').classList.toggle('on',log);document.getElementById('tabClose').classList.toggle('on',!log);
  document.getElementById('paneLog').style.display=log?'block':'none';document.getElementById('paneClose').style.display=log?'none':'block';
  document.getElementById('dLogBtn').style.display=log?'inline-flex':'none';document.getElementById('dCloseBtn').style.display=log?'none':'inline-flex';}
function onOutcome(){const v=document.getElementById('dOutcome').value;document.getElementById('dLogBtn').disabled=!v;
  const nx=NEXT[v];document.getElementById('dNextSec').style.display=nx?'block':'none';if(nx)document.getElementById('dNext').textContent=L(nx);}
function nowT(){return new Date().toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});}
function markRow(it,label,done){it._outcome=label+' · '+nowT();it._done=!!done;
  const el=document.getElementById('oc-'+it.id);if(el)el.innerHTML='<i class="ti ti-check"></i> '+it._outcome;
  if(done){const r=document.getElementById('row-'+it.id);if(r)r.classList.add('done');}}
const TMSG={
  logClosed:{en:'Logged ✓ — row completed',hi:'दर्ज ✓ — पंक्ति पूरी',mr:'नोंदवलं ✓ — ओळ पूर्ण झाली'},
  logOpen:{en:'Logged ✓ — row kept open, back tomorrow',hi:'दर्ज ✓ — पंक्ति खुली, कल फिर',mr:'नोंदवलं ✓ — ओळ उघडी, उद्या परत'},
  wa:{en:'🎂 WhatsApp wishes sent to',hi:'🎂 WhatsApp शुभकामना भेजी',mr:'🎂 WhatsApp शुभेच्छा पाठवल्या'},
};
function doLog(){const v=document.getElementById('dOutcome').value;if(!v||!cur)return;
  const oc=OUTCOMES[cur.cat]||OUTCOMES.default;const label=L(oc[v]);const closed=CLOSES[v];markRow(cur,label,closed);
  showToast((closed?L(TMSG.logClosed):L(TMSG.logOpen))+' ('+label+')');closeDrawer();}
function doClose(){if(!cur)return;markRow(cur,T('tabClose'),true);showToast(T('toastClosed'));closeDrawer();}
function sendWa(id){const it=store[id];markRow(it,'WhatsApp',true);showToast(LANG==='en'?(L(TMSG.wa)+' '+it.name+' ✓'):(L(TMSG.wa)+' — '+it.name+' ✓'));}
let tT;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),3400);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();closeForm();}});

// ══ Language ══════════════════════════════════════════════════════════════
function applyStatic(){document.querySelectorAll('[data-t]').forEach(el=>el.textContent=T(el.getAttribute('data-t')));
  document.querySelectorAll('[data-tph]').forEach(el=>el.setAttribute('placeholder',T(el.getAttribute('data-tph'))));}
function setLang(l){LANG=l;document.body.classList.toggle('lang-dev',l==='hi'||l==='mr');document.documentElement.lang=l;
  document.querySelectorAll('.langseg button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  renderTabs();applyStatic();renderView();
  if(cur){const v=document.getElementById('dOutcome').value;fillDrawer();document.getElementById('dOutcome').value=v;onOutcome();}
  if(CUR_FORM)openForm(CUR_FORM);}

// init
renderTabs();applyStatic();renderView();
</script>
</body>
</html>
