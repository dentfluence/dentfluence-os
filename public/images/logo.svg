<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 270" fill="none">
  <defs>
    <!-- Purple → Hot-Pink gradient matching the uploaded brand logo -->
    <linearGradient id="dfg" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%"   stop-color="#7B28C8"/>
      <stop offset="50%"  stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <!-- Subtle highlight for inner ribbon depth -->
    <linearGradient id="dfh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C060F0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F090FF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!--
    ═══════════════════════════════════════════════════════
    Dentfluence infinity+tooth symbol
    ───────────────────────────────────────────────────────
    One continuous closed path:
      • Start at center-top crossover  (210, 112)
      • Sweep LEFT  → around left loop (center ~105, 125)
      • Arrive at center-bottom        (210, 138)
      • Dip DOWN into tooth cusps      (→ y ~168)
      • Return to center-bottom        (210, 138)
      • Sweep RIGHT → around right loop (center ~315, 125)
      • Close back to center-top       (210, 112)
    Rendered as a thick stroke so the ribbon emerges naturally.
    ═══════════════════════════════════════════════════════
  -->

  <!-- Shadow / glow layer -->
  <path
    d="
      M 210,112
      C 196,68  162,38  108,38
      C 54,38   22,76   22,125
      C 22,174  54,212  108,212
      C 162,212 196,182 210,138
      L 205,150 Q 203,166 210,172 Q 217,166 215,150 L 210,138
      C 224,182 258,212 312,212
      C 366,212 398,174 398,125
      C 398,76  366,38  312,38
      C 258,38  224,68  210,112 Z
    "
    stroke="rgba(160,40,200,0.25)"
    stroke-width="38"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Main ribbon -->
  <path
    d="
      M 210,112
      C 196,68  162,38  108,38
      C 54,38   22,76   22,125
      C 22,174  54,212  108,212
      C 162,212 196,182 210,138
      L 205,150 Q 203,166 210,172 Q 217,166 215,150 L 210,138
      C 224,182 258,212 312,212
      C 366,212 398,174 398,125
      C 398,76  366,38  312,38
      C 258,38  224,68  210,112 Z
    "
    stroke="url(#dfg)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Inner highlight (gives 3-D ribbon depth) -->
  <path
    d="
      M 210,112
      C 196,68  162,38  108,38
      C 54,38   22,76   22,125
      C 22,174  54,212  108,212
      C 162,212 196,182 210,138
      C 224,182 258,212 312,212
      C 366,212 398,174 398,125
      C 398,76  366,38  312,38
      C 258,38  224,68  210,112 Z
    "
    stroke="url(#dfh)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
