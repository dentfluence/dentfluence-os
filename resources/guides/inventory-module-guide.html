<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Module — Interactive Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--p:#6a0f70;--pl:#faf5fb;--ink:#1e0a2c;--sub:#7a6884;--line:rgba(185,92,183,0.14);}
  body{font-family:'Inter','DM Sans',sans-serif;background:#efe7f2;color:var(--ink);}
  body.lang-dev{font-family:'Noto Sans Devanagari','Inter',sans-serif;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 14px 50px;}

  /* Header bar (the purple guide chrome) */
  .ghead{background:linear-gradient(120deg,#4e0a53,#6a0f70 55%,#8a2b90);color:#fff;padding:16px 24px;
         display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .ghead h1{font-size:19px;font-weight:700;}
  .ghead p{font-size:12px;opacity:.85;margin-top:2px;}
  .langsw{display:flex;gap:5px;background:rgba(255,255,255,.12);padding:4px;border-radius:9px;}
  .langsw button{border:none;background:none;color:rgba(255,255,255,.75);font:inherit;font-size:13px;font-weight:600;
                 padding:6px 13px;border-radius:6px;cursor:pointer;}
  .langsw button.on{background:#fff;color:var(--p);}

  /* App canvas */
  .app{background:#fff;border-radius:0 0 12px 12px;box-shadow:0 14px 40px rgba(30,10,44,.18);overflow:hidden;}
  .app-top{padding:20px 26px 0;}
  .ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .ph .title{font-family:'Cormorant Garamond','DM Sans',serif;}
  .ph h2{font-size:21px;font-weight:700;color:#1a0a1e;}
  .ph .sub{font-size:12.5px;color:var(--sub);margin-top:1px;}
  .btn{border:none;border-radius:6px;padding:8px 15px;font:inherit;font-size:13px;font-weight:500;cursor:pointer;
       display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .btn.p{background:var(--p);color:#fff;}
  .btn.o{background:#fff;color:var(--p);border:1px solid #d8c8e4;}

  /* Sub-nav (real inventory tabs) */
  .subnav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;border:1px solid var(--line);border-radius:6px;
          padding:0 4px;margin:16px 0 6px;}
  .subnav::-webkit-scrollbar{display:none;}
  .tab{display:inline-flex;align-items:center;gap:6px;padding:11px 13px;font-size:13px;color:var(--sub);cursor:pointer;
       white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;}
  .tab svg{width:13px;height:13px;stroke:#a090b0;fill:none;stroke-width:1.75;}
  .tab.on{color:var(--p);font-weight:600;border-bottom-color:var(--p);}
  .tab.on svg{stroke:var(--p);}
  .tab .mb{font-size:8.5px;text-transform:uppercase;letter-spacing:.05em;background:rgba(122,104,132,.16);color:var(--sub);
           padding:1px 4px;border-radius:4px;}

  /* Coach callout */
  .coach{display:flex;gap:9px;align-items:flex-start;background:#eaf6fb;border:1px solid #cfe8f2;border-radius:8px;
         padding:11px 14px;margin:14px 26px;font-size:13.5px;line-height:1.5;color:#155e75;}
  .coach b{color:#0e4a5e;}

  .body{padding:6px 26px 26px;}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 16px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
  .kpi .v{font-size:20px;font-weight:700;}
  .kpi .l{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .kpi .s{font-size:10.5px;color:#b09cbe;margin-top:1px;}
  .kpi.alert{border-left:3px solid #b52020;}

  /* health */
  .health{display:flex;align-items:center;gap:16px;background:#eff6ff;border:1px solid #cfe0fb;border-radius:10px;
          padding:14px 18px;margin-bottom:14px;}
  .health .ring{width:54px;height:54px;border-radius:50%;border:4px solid #2563eb;display:flex;align-items:center;
                justify-content:center;font-weight:800;color:#2563eb;font-size:15px;flex-shrink:0;}
  .health .g{font-size:15px;font-weight:700;color:#2563eb;}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{background:#faf5fb;text-align:left;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
           color:#9a85aa;padding:9px 12px;}
  thead th.r{text-align:right;}thead th.c{text-align:center;}
  tbody td{padding:10px 12px;border-bottom:1px solid #f4eef7;color:#33223f;vertical-align:middle;}
  tbody td.r{text-align:right;}tbody td.c{text-align:center;}
  tbody tr:last-child td{border-bottom:none;}
  .tbl-wrap{border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .code{font-size:10.5px;color:#9a85aa;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
  .adjust b{display:inline-flex;width:24px;height:24px;border-radius:5px;align-items:center;justify-content:center;
            font-weight:700;margin:0 2px;cursor:default;}
  .plus{background:#e8f7ef;color:#1a7a45;}.minus{background:#fdeaea;color:#b52020;}

  /* filter row */
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);
           border-radius:8px;padding:12px 14px;margin-bottom:12px;}
  .inp,.sel{padding:7px 11px;border:1px solid #d8c8e4;border-radius:6px;font:inherit;font-size:12.5px;color:#4e2060;
            background:#fff;}
  .inp{min-width:190px;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
  .fchip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(185,92,183,.18);
         background:#fff;color:#4e2060;}
  .fchip.on{background:var(--p);color:#fff;border-color:var(--p);}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin:6px 0 12px;font-size:11.5px;color:var(--sub);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}

  .cards5{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
  .rcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:13px 15px;}
  .rcard .t{font-size:13.5px;font-weight:600;color:#1a0a1e;}
  .rcard .d{font-size:11.5px;color:#9a85aa;margin-top:2px;}
  .sect-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin:16px 0 8px;
          display:flex;align-items:center;gap:8px;}
  .badge{background:#fee2e2;color:#b91c1c;font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px;}
  .infocard{display:flex;align-items:center;gap:10px;background:#f3f0f6;border:1px solid #e2dae9;border-radius:8px;
            padding:11px 14px;margin-bottom:14px;font-size:12.5px;color:#5a4a6a;}
  .valbar{height:6px;background:rgba(185,92,183,.08);border-radius:3px;overflow:hidden;margin-top:4px;}
  .valbar i{display:block;height:100%;border-radius:3px;}
  .footer{text-align:center;color:#9a85aa;font-size:12px;margin-top:20px;}
</style>
</head>
<body>

<div class="ghead">
  <div><h1 data-t="title"></h1><p data-t="subtitle"></p></div>
  <div class="langsw">
    <button data-lang="en" class="on" onclick="setLang('en')">English</button>
    <button data-lang="hi" onclick="setLang('hi')">हिंदी</button>
    <button data-lang="mr" onclick="setLang('mr')">मराठी</button>
  </div>
</div>

<div class="wrap">
  <div class="app">
    <div class="app-top">
      <div class="ph">
        <div class="title"><h2>Inventory</h2><div class="sub" id="phsub"></div></div>
        <div id="phact"></div>
      </div>
      <div class="subnav" id="subnav"></div>
    </div>
    <div class="coach"><span>💡</span><span id="coach"></span></div>
    <div class="body" id="screen"></div>
  </div>
  <div class="footer" data-t="footer"></div>
</div>

<script>
let LANG='en', ACTIVE='dashboard';
function L(o){return (o&&(o[LANG]||o.en))||'';}
// t(en,hi,mr) shorthand
function t(en,hi,mr){return {en,hi,mr};}

const D = {

  subtitle:t('Walkable walkthrough · click the tabs · English / हिंदी / मराठी','चलने-योग्य वॉकथ्रू · टैब पर क्लिक करें · English / हिंदी / मराठी','चालण्याजोगे मार्गदर्शन · टॅबवर क्लिक करा · English / हिंदी / मराठी'),

  cExpected:t('Expected','अपेक्षित','अपेक्षित'), cTotal:t('Total','कुल','एकूण'), cActions:t('Actions','क्रिया','क्रिया'),
  cWhen:t('When','कब','केव्हा'), cAction:t('Action','क्रिया','क्रिया'), cItem:t('Item','आइटम','आयटम'),
  cChange:t('Change','बदलाव','बदल'), cBy:t('By','द्वारा','कोणी'), cNote:t('Note','नोट','नोंद'),
  cReceiptNo:t('Receipt No','रसीद नंबर','पावती क्र.'), cDate:t('Date','तारीख','तारीख'), cSupplier:t('Supplier','सप्लायर','पुरवठादार'),

  allStock:t('All Stock Status','सभी स्टॉक स्थिति','सर्व स्टॉक स्थिती'), allCat:t('All Categories','सभी श्रेणियाँ','सर्व श्रेणी'), allBrand:t('All Brands','सभी ब्रांड','सर्व ब्रँड'),

const TABS = [
  {k:'dashboard',p:1,svg:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',lab:t('Dashboard','डैशबोर्ड','डॅशबोर्ड')},

const COACH = {
  dashboard:t('Open this first every day. The health score and the red/amber numbers tell you what needs attention now.','हर दिन सबसे पहले यही खोलें। हेल्थ स्कोर और लाल/पीले नंबर बताते हैं कि अभी किस पर ध्यान देना है।','दररोज सर्वात आधी हेच उघडा. हेल्थ स्कोअर व लाल/पिवळे आकडे आत्ता कशाकडे लक्ष द्यायचे ते सांगतात.'),
  items:t('Every product lives here. The colour dot is its stock status. Set a Minimum Stock on each item so alerts can work.','हर प्रोडक्ट यहाँ है। रंगीन बिंदु उसकी स्टॉक स्थिति है। हर आइटम पर Minimum Stock सेट करें ताकि अलर्ट काम करें।','प्रत्येक प्रोडक्ट इथे आहे. रंगीत बिंदू त्याची स्टॉक स्थिती आहे. प्रत्येक आयटमवर Minimum Stock सेट करा म्हणजे अलर्ट काम करतील.'),
  purchase:t('Create a PO, mark it Ordered, then Receive when stock arrives. Receiving adds stock + a Received Stock record + a bill in Finance.','PO बनाएँ, Ordered करें, फिर स्टॉक आने पर Receive करें। Receive करने से स्टॉक + Received Stock रिकॉर्ड + Finance में बिल जुड़ता है।','PO तयार करा, Ordered करा, मग स्टॉक आल्यावर Receive करा. Receive केल्याने स्टॉक + Received Stock नोंद + Finance मध्ये बिल जोडले जाते.'),

function statusChip(kind){
  const m={inStock:['#e8f7ef','#1a7a45',D.inStock],low:['#fff4e0','#a05c00',D.low],critical:['#fff1e0','#d97706',D.critical],
    out:['#fdeaea','#b52020',D.out],minNot:['#f3f0f6','#7a6884',D.minNot]};
  const s=m[kind];return `<span class="chip" style="background:${s[0]};color:${s[1]}">${L(s[2])}</span>`;}
function poChip(kind){const m={draft:['#fff4e0','#a05c00',D.draft],ordered:['#e8f0fb','#1a5ea8',D.ordered],
    partial:['#fff8ec','#7a4a00',D.partial],completed:['#e8f7ef','#1a7a45',D.completed]};
  const s=m[kind];return `<span class="chip" style="background:${s[0]};color:${s[1]}">${L(s[2])}</span>`;}
function dotColor(k){return {inStock:'#1a7a45',low:'#a05c00',critical:'#d97706',out:'#b52020',minNot:'#7a6884'}[k];}

/* page actions per tab */
function phAction(){
  if(ACTIVE==='items') return `<button class="btn p">+ ${L(D.addProduct)}</button>`;
  if(ACTIVE==='purchase') return `<button class="btn p">+ ${L(D.createPO)}</button>`;
  if(ACTIVE==='count') return `<button class="btn p">⟳ ${L(D.startCount)}</button>`;
  if(ACTIVE==='implants') return `<button class="btn p">+ ${L(t('Add to Catalog','कैटलॉग में जोड़ें','कॅटलॉगमध्ये जोडा'))}</button>`;
  if(ACTIVE==='assets') return `<button class="btn p">+ ${L(t('Add Asset','एसेट जोड़ें','ॲसेट जोडा'))}</button>`;
  return '';
}

function renderTabs(){
  document.getElementById('subnav').innerHTML = TABS.map(x=>{
    const badge = x.p ? '' : `<span class="mb">${L(D.inMore)}</span>`;
    return `<span class="tab${x.k===ACTIVE?' on':''}" onclick="setTab('${x.k}')"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${x.svg}</svg>${L(x.lab)}${badge}</span>`;
  }).join('');
}
function setTab(k){ACTIVE=k;render();}
function render(){
  document.getElementById('phsub').textContent = L(SUB[ACTIVE]);
  document.getElementById('phact').innerHTML = phAction();
  document.getElementById('coach').innerHTML = '<b>'+L(t('Coach:','गाइड:','मार्गदर्शक:'))+'</b> '+L(COACH[ACTIVE]);
  renderTabs(); renderScreens();
}
function applyStatic(){document.querySelectorAll('[data-t]').forEach(el=>el.textContent=L(D[el.getAttribute('data-t')]));}
function setLang(l){LANG=l;document.body.classList.toggle('lang-dev',l==='hi'||l==='mr');document.documentElement.lang=l;
  document.querySelectorAll('.langsw button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-lang')===l));
  applyStatic();render();}
// When shown inside the in-app popup (iframe), the modal already shows the title,
// so hide the guide's own title/subtitle and keep just the language toggle bar.
if (window.self !== window.top) {
  var _td = document.querySelector('.ghead > div:first-child');
  if (_td) _td.style.display = 'none';
  document.querySelector('.ghead').style.justifyContent = 'flex-end';
}
applyStatic();render();
</script>
